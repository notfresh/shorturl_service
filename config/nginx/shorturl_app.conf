upstream app {
 ip_hash;
 server app:8000; # this refers to the docker-compose.yml
}

server {
  listen 8000;

  server_name localhost;

  # 静态文件：播放器页面
  location = /pie {
    root /srv/static;
    try_files /audio_player_pie.html =404;
    default_type text/html;
  }

  # 静态文件：字幕目录
  location /Podcast-Subtitle/ {
    alias /srv/static/Podcast-Subtitle/;
    autoindex off;
  }

  # 其余请求重定向 HTTPS
  location / {
    rewrite ^(.*)$ https://$host$1 redirect;
  }
}

server {
  listen 443 ssl;
  server_name jumper.pub; # 替换为你的实际域名
  ssl_certificate /etc/nginx/certs/jumper.pub.pem;
  ssl_certificate_key /etc/nginx/certs/jumper.pub.key;

  # 静态文件：播放器页面
  location = /pie {
    root /srv/static;
    try_files /audio_player_pie.html =404;
    default_type text/html;
  }

  # 静态文件：字幕目录
  location /Podcast-Subtitle/ {
    alias /srv/static/Podcast-Subtitle/;
    autoindex off;
  }

  # 其余请求转发给 Flask
  location / {
    proxy_pass http://app/;
  }
}

